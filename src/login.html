<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>ShortsRemixer · 로그인</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Pretendard:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-0: #08080f;
    --bg-1: #0f0f1e;
    --bg-2: #161629;
    --bg-3: #1f1f3a;
    --line: #2a2a45;
    --text: #e8e8f0;
    --text-dim: #8a8ab0;
    --accent: #00d4ff;
    --accent-2: #a855f7;
    --accent-grad: linear-gradient(135deg, #00d4ff 0%, #a855f7 100%);
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
  }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg-0);
    color: var(--text);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(0, 212, 255, 0.1) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
  }

  .container { width: 420px; padding: 0 24px; }

  .logo-wrap { text-align: center; margin-bottom: 28px; }

  .logo {
    font-family: 'Gaegu', cursive;
    font-size: 42px;
    background: var(--accent-grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tagline {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--bg-2);
    padding: 4px;
    border-radius: 10px;
  }

  .tab {
    flex: 1;
    padding: 9px;
    text-align: center;
    cursor: pointer;
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 700;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent-grad);
    color: white;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  label {
    display: block;
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .form-row { margin-bottom: 12px; }

  .input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 13px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    transition: all 0.2s;
  }

  .input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.12);
  }

  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    background: var(--accent-grad);
    color: white;
    margin-top: 6px;
    transition: all 0.2s;
  }

  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { background: var(--bg-3); }

  .msg {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.5;
    display: none;
  }

  .msg.show { display: block; }
  .msg.error { background: rgba(239, 68, 68, 0.12); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
  .msg.success { background: rgba(16, 185, 129, 0.12); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
  .msg.info { background: rgba(0, 212, 255, 0.08); color: var(--accent); border: 1px solid rgba(0, 212, 255, 0.3); }
  .msg.warn { background: rgba(245, 158, 11, 0.1); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }

  .hint { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

  .footer {
    text-align: center;
    margin-top: 18px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .footer a {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
  }

  /* 서버 설정 영역 */
  .server-section {
    background: var(--bg-2);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 16px;
    border: 1px solid var(--line);
  }

  .server-section .label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .server-section .change-btn {
    font-size: 10px;
    color: var(--accent);
    cursor: pointer;
    background: none;
    border: none;
    font-weight: 700;
  }

  .server-display {
    font-family: monospace;
    font-size: 11px;
    color: var(--text);
    word-break: break-all;
  }

  .server-display.empty { color: var(--text-dim); font-style: italic; }

  .device-info {
    margin-top: 14px;
    padding: 8px 10px;
    background: var(--bg-2);
    border-radius: 6px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: monospace;
    text-align: center;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo-wrap">
    <div class="logo">쇼츠 리믹서</div>
    <div class="tagline">SHORTS REMIXER</div>
  </div>

  <div class="card">
    <!-- 서버 설정 -->
    <div class="server-section">
      <div class="label-row">
        <label style="margin:0;">인증 서버</label>
        <button class="change-btn" id="changeServerBtn">변경</button>
      </div>
      <div class="server-display empty" id="serverDisplay">서버 미설정 - 클릭해서 입력</div>
      <div id="serverEditBox" style="display:none; margin-top:8px;">
        <input class="input" type="text" id="serverInput" placeholder="https://your-server.up.railway.app" style="font-size:11px;" />
        <button class="btn" id="saveServerBtn" style="margin-top:6px; padding:8px;">저장</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="login">로그인</div>
      <div class="tab" data-tab="register">회원가입</div>
    </div>

    <!-- 로그인 -->
    <div class="tab-content active" id="content-login">
      <div class="form-row">
        <label>아이디 또는 이메일</label>
        <input class="input" type="text" id="loginUsername" autocomplete="username" />
      </div>
      <div class="form-row">
        <label>비밀번호</label>
        <input class="input" type="password" id="loginPassword" autocomplete="current-password" />
      </div>
      <button class="btn" id="loginBtn">로그인</button>
      <div class="msg" id="loginMsg"></div>
    </div>

    <!-- 회원가입 -->
    <div class="tab-content" id="content-register">
      <div class="form-row">
        <label>초대 코드 (선택)</label>
        <input class="input" type="text" id="regInvite" placeholder="없으면 빈칸" style="text-transform:uppercase;" />
        <div class="hint">체험판은 코드 없이 가입 가능 · 베이직/프로/평생권은 코드 필요</div>
      </div>
      <div class="form-row">
        <label>아이디 *</label>
        <input class="input" type="text" id="regUsername" placeholder="3~30자" />
      </div>
      <div class="form-row">
        <label>이메일 *</label>
        <input class="input" type="email" id="regEmail" />
      </div>
      <div class="form-row">
        <label>비밀번호 *</label>
        <input class="input" type="password" id="regPassword" placeholder="6자 이상" />
      </div>
      <div class="form-row">
        <label>비밀번호 확인 *</label>
        <input class="input" type="password" id="regPassword2" placeholder="다시 입력" />
      </div>
      <button class="btn" id="registerBtn">가입하기</button>
      <div class="msg" id="regMsg"></div>
    </div>

    <div class="device-info" id="deviceInfo">device: ...</div>
  </div>

  <div class="footer">
    체험판 5회 무료 · 가입 후 즉시 사용 가능
  </div>
</div>

<script>
  // ===== 서버 URL 표시 =====
  async function refreshServerDisplay() {
    const url = await window.api.authGetServer();
    const display = document.getElementById('serverDisplay');
    if (url) {
      display.textContent = url;
      display.classList.remove('empty');
    } else {
      display.textContent = '서버 미설정 - 변경 클릭';
      display.classList.add('empty');
    }
  }

  document.getElementById('changeServerBtn').addEventListener('click', () => {
    const box = document.getElementById('serverEditBox');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
    if (box.style.display === 'block') {
      window.api.authGetServer().then(url => {
        document.getElementById('serverInput').value = url || '';
        document.getElementById('serverInput').focus();
      });
    }
  });

  document.getElementById('saveServerBtn').addEventListener('click', async () => {
    const url = document.getElementById('serverInput').value.trim();
    if (!url) {
      alert('URL을 입력하세요');
      return;
    }
    if (!url.startsWith('http')) {
      alert('URL은 http:// 또는 https:// 로 시작해야 합니다');
      return;
    }
    await window.api.authSetServer(url);
    await refreshServerDisplay();
    document.getElementById('serverEditBox').style.display = 'none';
  });

  // ===== 디바이스 핑거프린트 표시 =====
  window.api.authDeviceFingerprint().then(fp => {
    document.getElementById('deviceInfo').textContent = 'device: ' + fp.substring(0, 16) + '...';
  });

  // ===== 탭 전환 =====
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('content-' + tab.dataset.tab).classList.add('active');
    });
  });

  function showMsg(elId, text, type) {
    const el = document.getElementById(elId);
    el.textContent = text;
    el.className = 'msg show ' + type;
  }

  function hideMsg(elId) {
    document.getElementById(elId).className = 'msg';
  }

  // ===== 로그인 =====
  async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!username || !password) {
      return showMsg('loginMsg', '아이디와 비밀번호 입력', 'error');
    }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '로그인 중...';
    hideMsg('loginMsg');

    const result = await window.api.authLogin({ username, password });

    btn.disabled = false;
    btn.textContent = '로그인';

    if (!result.ok) {
      let msg = result.error || '로그인 실패';
      
      // 체험판 만료 특별 처리
      if (result.error === 'TRIAL_EXPIRED' || (result.data && result.data.error === 'TRIAL_EXPIRED')) {
        const data = result.data || {};
        showTrialExpiredModal(data.usageCount || 10, data.usageLimit || 10);
        return;
      }
      
      if (result.status === 403) {
        showMsg('loginMsg', '⏳ ' + msg, 'warn');
      } else {
        showMsg('loginMsg', msg, 'error');
      }
      return;
    }

    showMsg('loginMsg', '✅ 로그인 성공! 잠시만요...', 'success');
    // main.js가 자동으로 메인 윈도우로 전환
  }
  
  // 체험판 만료 모달
  function showTrialExpiredModal(usageCount, usageLimit) {
    // 기존 모달 제거
    const existing = document.getElementById('trialExpiredModal');
    if (existing) existing.remove();
    
    const modal = document.createElement('div');
    modal.id = 'trialExpiredModal';
    modal.style.cssText = `
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    `;
    modal.innerHTML = `
      <div style="
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        border: 1px solid #333; border-radius: 20px;
        padding: 40px; max-width: 420px; text-align: center;
      ">
        <div style="font-size: 48px; margin-bottom: 16px;">⏰</div>
        <h2 style="font-size: 22px; margin-bottom: 12px; color: #fff;">체험판이 만료되었습니다</h2>
        <p style="color: #aaa; font-size: 14px; line-height: 1.6; margin-bottom: 20px;">
          ${usageCount}/${usageLimit}회 모두 사용하셨습니다.<br>
          정식판으로 업그레이드하시면<br>
          <span style="color: #00d4ff;">무제한</span>으로 사용 가능합니다!
        </p>
        <div style="
          background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
          border-radius: 12px; padding: 16px; margin-bottom: 24px; text-align: left;
        ">
          <div style="font-size: 13px; color: #00d4ff; font-weight: 700; margin-bottom: 8px;">✨ 정식판 혜택</div>
          <div style="font-size: 12px; color: #ccc; line-height: 1.8;">
            • 무제한 영상 생성<br>
            • 모든 기능 사용 가능<br>
            • 우선 고객 지원
          </div>
        </div>
        <a href="https://open.kakao.com/me/Zheila" target="_blank" style="
          display: inline-block; padding: 14px 32px;
          background: linear-gradient(135deg, #00d4ff 0%, #a855f7 100%);
          color: #fff; text-decoration: none; border-radius: 12px;
          font-weight: 700; font-size: 15px;
        ">💬 카카오톡 문의하기</a>
        <div style="margin-top: 16px;">
          <button onclick="this.closest('#trialExpiredModal').remove()" style="
            background: none; border: none; color: #666;
            font-size: 13px; cursor: pointer;
          ">닫기</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  }

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPassword').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });

  // ===== 회원가입 =====
  async function doRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const password2 = document.getElementById('regPassword2').value;
    const inviteCode = document.getElementById('regInvite').value.trim().toUpperCase();

    if (!username || !email || !password) {
      return showMsg('regMsg', '필수 항목을 입력하세요', 'error');
    }
    if (password.length < 6) {
      return showMsg('regMsg', '비밀번호는 6자 이상', 'error');
    }
    if (password !== password2) {
      return showMsg('regMsg', '비밀번호가 일치하지 않습니다', 'error');
    }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.textContent = '가입 중...';
    hideMsg('regMsg');

    const result = await window.api.authRegister({
      username, email, password,
      inviteCode: inviteCode || undefined,
    });

    btn.disabled = false;
    btn.textContent = '가입하기';

    if (!result.ok) {
      return showMsg('regMsg', result.error || '가입 실패', 'error');
    }

    showMsg('regMsg', '✅ 가입 완료! 위에서 로그인하세요.', 'success');

    // 폼 초기화
    setTimeout(() => {
      document.querySelector('[data-tab="login"]').click();
      document.getElementById('loginUsername').value = username;
    }, 1500);
  }

  document.getElementById('registerBtn').addEventListener('click', doRegister);
  document.getElementById('regPassword').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doRegister();
  });
  document.getElementById('regPassword2').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doRegister();
  });

  // 초기화
  refreshServerDisplay();
  document.getElementById('loginUsername').focus();
</script>
</body>
</html>
